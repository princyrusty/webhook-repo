<!DOCTYPE html>
<html>
<head>
    <title>GitHub Repository Activity</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            padding: 40px;
        }
        h2 {
            margin-bottom: 20px;
        }
        .event {
            background: white;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 6px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<h2>Latest Repository Activity</h2>
<div id="events"></div>

<script>
async function fetchEvents() {
    const response = await fetch("/events");
    const data = await response.json();

    const container = document.getElementById("events");
    container.innerHTML = "";

    data.forEach(event => {
        let text = "";

        if (event.action === "PUSH") {
            text = `${event.author} pushed to ${event.to_branch} on ${event.timestamp}`;
        }

        if (event.action === "PULL_REQUEST") {
            text = `${event.author} submitted a pull request from ${event.from_branch} to ${event.to_branch} on ${event.timestamp}`;
        }

        if (event.action === "MERGE") {
            text = `${event.author} merged branch ${event.from_branch} to ${event.to_branch} on ${event.timestamp}`;
        }

        const div = document.createElement("div");
        div.className = "event";
        div.innerText = text;

        container.appendChild(div);
    });
}

fetchEvents();
setInterval(fetchEvents, 15000);
</script>

</body>
</html>
